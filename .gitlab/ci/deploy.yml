deploy_production:
  stage: deploy
  image: alpine:latest

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

  before_script:
    - apk add --no-cache openssh-client coreutils
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d > private_key
    - chmod 600 private_key
    - ssh-add private_key
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

  script:
    - |
      ssh ubuntu@$SERVER_HOST << 'EOF'
        # Dynamically find the deployment path
        TARGET_DIR=$(grep "webapp_dir:" ~/.dplay/config.yaml | cut -d ':' -f 2 | xargs)

        if [ -d "$TARGET_DIR" ]; then
          cd "$TARGET_DIR"

          # Run the deployment script
          bash scripts/deploy.sh
        else
          echo "Error: Directory $TARGET_DIR not found"
          exit 1
        fi
      EOF

  environment:
    name: production
    url: https://djangoplay.org