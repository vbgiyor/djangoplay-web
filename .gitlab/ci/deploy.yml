deploy_production:
  stage: deploy
  image: alpine:latest

  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

  before_script:
    - apk add --no-cache openssh-client coreutils
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | base64 -d > private_key
    - chmod 600 private_key
    - ssh-add private_key
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

  script:
    - |
      ssh ubuntu@$SERVER_HOST << 'EOF'
        set -e
        echo "==> Pulling latest code..."
        cd /var/www/djangoplay/app
        git pull

        echo "==> Restarting services..."
        sudo systemctl restart djangoplay djangoplay-celery

        echo "==> Done."
      EOF

  environment:
    name: production
    url: https://djangoplay.org