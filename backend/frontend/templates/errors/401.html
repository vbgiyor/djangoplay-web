{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, noarchive">
    <title>{{ title|default:"401 - Session Expired" }} | DjangoPlay</title>
    <link rel="icon" type="image/png" href="{% static 'elements/images/logo/logo_icon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'design/css/app/common.css' %}">
    <link rel="stylesheet" href="{% static 'design/css/themes/space.css' %}">
    <link rel="stylesheet" href="{% static 'design/css/app/401.css' %}">
</head>
<body>
    <main class="error-container-window">
        <i class="fas fa-{{ icon }} error-icon"></i>
        <h1 class="error-title">{{ title }}</h1>
        <p class="error-message">
            {{ message }}<br>
            <small>{{ subtitle }}</small>
        </p>

        <button class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#reloginModal">
            <i class="fas fa-sign-in-alt"></i> {{ button_text }}
        </button>

        <div class="error-links d-flex justify-content-between mt-3">
            <a href="{% url 'support' %}" class="support-link" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-headset support-icon"></i>{% trans "Contact Support" %}
            </a>
            <a href="{% url 'frontend:api_login' %}" class="text-link">{% trans "Back to API Console" %}</a>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="loginToast" class="toast align-items-center text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="fas fa-check-circle"></i> Logged in successfully!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Re-Login Modal -->
    <div class="modal fade" id="reloginModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">{{ modal_title }}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="reloginForm">
                        <div class="mb-3">
                            <label class="form-label">{% trans "Username or Email" %}</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">{% trans "Password" %}</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe" name="remember_me">
                            <label class="form-check-label" for="rememberMe">Remember me (30 days)</label>
                        </div>
                        <div id="loginError" class="text-danger small mb-2" style="display:none;"></div>
                        <button type="submit" class="btn btn-primary w-100">
                            <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                            {% trans "Log In" %}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
        const modal = new bootstrap.Modal('#reloginModal');
        modal.show();

        const form = document.getElementById('reloginForm');
        const errorDiv = document.getElementById('loginError');
        const spinner = form.querySelector('.spinner-border');
        const toast = new bootstrap.Toast(document.getElementById('loginToast'));

        // Auto-fill from localStorage
        const savedUsername = localStorage.getItem('remembered_username') || '';
        const savedRemember = localStorage.getItem('remember_me') === 'true';
        if (savedUsername && savedRemember) {
            form.username.value = savedUsername;
            form.remember_me.checked = true;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            spinner.classList.remove('d-none');

            const username = form.username.value.trim();
            const password = form.password.value;
            const remember_me = form.remember_me?.checked || false;

            try {
            const res = await fetch('/api/v1/auth/token/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, remember_me })
            });

            const data = await res.json();

            if (res.ok && data.access) {
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);

                if (remember_me) {
                localStorage.setItem('remember_me', 'true');
                localStorage.setItem('remembered_username', username);
                } else {
                localStorage.removeItem('remember_me');
                localStorage.removeItem('remembered_username');
                }

                toast.show();
                setTimeout(() => location.href = '/api/v1/swagger/', 1500);
            } else {
                errorDiv.textContent = data.detail || 'Invalid credentials';
                errorDiv.style.display = 'block';
            }
            } catch (err) {
            errorDiv.textContent = 'Network error. Try again.';
            errorDiv.style.display = 'block';
            } finally {
            spinner.classList.add('d-none');
            }
        });
        });
    </script>
</body>
</html>
