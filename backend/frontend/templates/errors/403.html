{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, noarchive">
    <title>403 - Access Denied | DjangoPlay</title>
    <link rel="icon" type="image/png" href="{% static 'elements/images/logo/logo_icon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'design/css/app/common.css' %}">
    <link rel="stylesheet" href="{% static 'design/css/themes/space.css' %}">
    <link rel="stylesheet" href="{% static 'design/css/app/403.css' %}">
</head>
<body>
    <header class="header-container">
        <a href="{% if request.user.is_authenticated %}{% url 'console_dashboard' %}{% else %}{% url 'account_login' %}{% endif %}">
            <img src="{% static 'elements/images/logo/logo_icon.png' %}" alt="DjangoPlay Logo" class="logo-icon"><img src="{% static 'elements/images/logo/logotext-color.png' %}" alt="DjangoPlay Logo" class="logo">
        </a>
    </header>
    <main class="error-container-window">
        <i class="fas fa-lock error-icon"></i>
        <h1 class="error-title">403 - Access Denied</h1>
        <p class="error-message">
            {% trans "Sorry, you don't have permission to view this page." %}
            <br>
            {% trans "Please contact our support team to request access." %}
        </p>
        <div class="error-links d-flex justify-content-between mt-3">
            <a href="{% url 'support' %}" class="support-link" target="_blank" rel="noopener noreferrer">
                <i class="fas fa-headset support-icon"></i>{% trans "Contact Support" %}
            </a>
            <a href="{{ back_url }}" class="text-link"> {% trans "Back" %} </a>              
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
