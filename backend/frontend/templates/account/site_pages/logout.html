{% load i18n static socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "DjangoPlay - Sign In" %}</title>
    <link rel="icon" type="image/png" href="{% static 'elements/images/logo/logo_icon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'design/css/app/common.css' %}">
    <link rel="stylesheet" href="{% static 'design/css/themes/space.css' %}">
    <link rel="stylesheet" href="{% static 'design/css/themes/toggle.css' %}">
</head>
<body class="login-page">
    <div id="stars"></div>
    <header class="text-center py-3">
        <div class="header-container">
            <a href="{% if request.user.is_authenticated %}{% url 'console_dashboard' %}{% else %}{% url 'account_login' %}{% endif %}">
                <img src="{% static 'elements/images/logo/logo_icon.png' %}" alt="DjangoPlay Logo" class="logo-icon"><img src="{% static 'elements/images/logo/logotext-color.png' %}" alt="DjangoPlay Logo" class="logo">
            </a>
        </div>
    </header>
    <div class="container mt-5 mb-4">
        <div class="login-container">
            <p class="text-center">{% trans "You have been logged out." %}</p>
                <p class="text-center">
                    <a href="{% url 'account_login' %}" class="btn btn-primary btn-block w-50">{% trans "Sign In Again" %}</a>
                </p>
        </div>
    </div>
    <div class="theme-toggle-container">
        <input type="checkbox" id="theme-switch" class="theme-toggle">
        <label for="theme-switch" class="slider"></label>
    </div>
    
    <footer class="footer-container">
        <div class="links-container">
            <i class="fas fa-copyright"></i> 2025 DjangoPlay
            <i class="fas fa-book"></i>
            <a href="{% url 'apidocs:redoc' %}" class="primary-text" target="_blank" rel="noopener noreferrer">Documentation</a>
            <i class="fas fa-headset"></i>
            <a href="{% url 'support' %}" class="primary-text" rel="noopener noreferrer">Support</a>
            <i class="fas fa-signature"></i>
            <a href="{% url 'frontend:license' %}" class="primary-text" target="_blank" rel="noopener noreferrer">Apache License 2.0</a>
            </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
    <script src="{% static 'design/js/space.js' %}"></script>
    <audio id="toggle-sound" src="{% static 'sounds/toggle-on.mp3' %}" preload="auto"></audio>
</body>
</html>
