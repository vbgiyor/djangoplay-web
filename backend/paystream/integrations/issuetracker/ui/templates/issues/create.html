{% extends "admin/base.html" %}

{% block content %}
<div class="mt-4 text-start">

    <div class="mb-3">
        <a href="{% url 'issues:list' %}" class="text-decoration-none">
            ← Back to Issues
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <h4>Create Issue</h4>

            <form method="post" enctype="multipart/form-data" class="mt-3">
                {% csrf_token %}

                <div class="mb-3">
                    {% if request.user.is_authenticated %}
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email"
                                class="form-control"
                                value="{{ request.user.email }}"
                                readonly>
                            <small class="text-muted">
                                Issue will be created using your account email.
                            </small>
                        </div>
                    {% elif allow_anonymous %}
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email"
                                name="reporter_email"
                                class="form-control"
                                required>
                        </div>
                    {% endif %}
                    <label>Title</label>
                    <input type="text" name="title" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Description</label>
                    <textarea name="description" rows="5"
                              class="form-control"
                              required></textarea>
                </div>

                <div class="mb-3">
                    <label>Priority</label>
                    <select name="priority" class="form-select">
                        {% for value,label in priority_choices %}
                            <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox"
                           class="form-check-input"
                           name="is_public"
                           id="is_public"
                           checked>
                    <label class="form-check-label" for="is_public">
                        Public Issue
                    </label>
                </div>

                <div class="mb-3">
                    <label>Attachments (optional)</label>
                    <input type="file"
                           name="files"
                           multiple
                           class="form-control">
                </div>

                <button type="submit" class="btn btn-primary">
                    Submit Issue
                </button>

            </form>

        </div>
    </div>

</div>
{% endblock %}
