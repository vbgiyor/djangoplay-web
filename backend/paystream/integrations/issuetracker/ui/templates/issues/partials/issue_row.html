{% load tz %}
{% load humanize %}

<div class="list-group-item d-flex justify-content-between align-items-start">

    <div class="ms-2 me-auto">        
        <div class="fw-bold">
            <a href="{% url 'issues:detail' issue.issue_number %}">
                #{{ issue.issue_number }} {{ issue.title }}
            </a>
            {% if not issue.is_public %}
                <i class="fas fa-lock text-muted ms-1"></i>
            {% endif %}
        </div>

        <small class="text-muted text-nowrap">
            {{ issue.comments.count }} comments •
            
            <span title="{{ issue.created_at|naturaltime }}">
                {{ issue.created_at|localtime|date:"d M Y, h:i A" }} IST
            </span>
            
            • {{ issue.reporter_email }}
        </small>
    </div>

    <div>
        <span class="badge bg-secondary me-1">
            {{ issue.priority }}
        </span>

        <span class="badge bg-success">
            {{ issue.status }}
        </span>
    </div>

</div>
