openapi: 3.0.3
info:
  title: DjangoPlay APIs
  version: 1.0.0
  description: Unlock the power of the DjangoPlay platform with our APIs for seamless
    business automation. Integrate and manage users, invoices, and locations effortlessly
    using our comprehensive OpenAPI specification.
paths:
  /api/v1/auth/token/:
    post:
      operationId: api_v1_auth_token_create
      description: "\n        Authenticate with username/email and password to get\
        \ JWT tokens.\n        Accepts `username` or `email` as login identifier.\n\
        \        "
      summary: Obtain JWT Token Pair
      tags:
      - 'Authentication: JWT'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
                remember_me:
                  type: boolean
              required:
              - username
              - password
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                  refresh:
                    type: string
          description: Success
        '401':
          description: Invalid credentials
  /api/v1/entities/crud/entities/:
    get:
      operationId: entities_list
      description: "List entities.\n        - App-level exception handling via `error_class`\n\
        \        - Throttling, filtering, pagination\n        - Standard CRUD logging\
        \ and cache invalidation\n    \n        - Caching enabled for this view\n\
        \    "
      summary: List Entities
      parameters:
      - in: query
        name: default_address
        schema:
          type: integer
      - in: query
        name: entity_type
        schema:
          type: string
          x-spec-enum-id: 063e2e3d5190bb3b
          enum:
          - BUSINESS
          - GOVERNMENT
          - INDIVIDUAL
          - NONPROFIT
          - OTHER
          - PARTNERSHIP
          - SOLE_PROPRIETORSHIP
        description: |-
          Type of entity...

          * `INDIVIDUAL` - Individual
          * `BUSINESS` - Business
          * `GOVERNMENT` - Government
          * `NONPROFIT` - Nonprofit
          * `PARTNERSHIP` - Partnership
          * `SOLE_PROPRIETORSHIP` - Sole Proprietorship
          * `OTHER` - Other
      - in: query
        name: industry
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: parent
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          x-spec-enum-id: 5d61d2ae35b318b6
          enum:
          - ACTIVE
          - INACTIVE
          - ON_HOLD
          - PENDING
          - SUSPENDED
        description: |-
          Status of the entity...

          * `PENDING` - Pending
          * `ACTIVE` - Active
          * `INACTIVE` - Inactive
          * `SUSPENDED` - Suspended
          * `ON_HOLD` - On Hold
      tags:
      - Business
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEntityReadSerializerV1List'
          description: Success
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '404':
          description: Not found
        '500':
          description: Server error
    post:
      operationId: entities_create
      description: "Create an entity.\n        - App-level exception handling via\
        \ `error_class`\n        - Throttling, filtering, pagination\n        - Standard\
        \ CRUD logging and cache invalidation\n    "
      summary: Create Entity
      tags:
      - Business
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityWriteSerializerV1Request'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EntityWriteSerializerV1Request'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EntityWriteSerializerV1Request'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityReadSerializerV1'
          description: Success
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Permission denied
        '404':
          description: Not found
        '500':
          description: Server error
