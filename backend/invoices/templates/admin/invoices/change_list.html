{% extends "admin/change_list.html" %}

{% block filters %}
  {{ block.super }}
  <div id="changelist-filter-clear">
    <a href="{% url 'admin:%s_%s_changelist' opts.app_label opts.model_name %}" class="button">Clear All Filters</a>
  </div>
{% endblock %}

{% block extrastyle %}
  {{ block.super }}
  <style>
    #changelist-filter-clear {
      margin-top: 10px;
      margin-bottom: 10px;
      padding: 0 14px;
    }
    #changelist-filter-clear .button {
      background-color: #f44336;
      color: white;
      padding: 8px 16px;
      text-decoration: none;
      border-radius: 4px;
      display: inline-block;
    }
    #changelist-filter-clear .button:hover {
      background-color: #d32f2f;
    }
  </style>
{% endblock %}
